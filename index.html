<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Регистър на автомобили</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 👤 ICON -->
<div class="top-right">
    <span class="user-icon" onclick="openLogin()">👤</span>
</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>Admin Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="error"></p>
    </div>
</div>

<h1>🚗 Регистър на автомобили</h1>

<input type="text" id="search" placeholder="Търси по номер или марка...">

<div id="list"></div>

<script src="script.js"></script>
</body>
</html>
